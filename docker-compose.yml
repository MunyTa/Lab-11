version: '3.8'

services:
  go-service:
    build: ./services/go-service
    container_name: go-app
    ports:
      - "${GO_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DEBUG=${DEBUG:-false}
    healthcheck:
      test: ["CMD", "/server", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - app-network

  python-service:
    build: ./services/python-service
    container_name: python-app
    ports:
      - "${PYTHON_PORT:-8000}:8000"
    environment:
      - PORT=8000
      - DEBUG=${DEBUG:-false}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, os; urllib.request.urlopen(f'http://localhost:{os.environ.get(\"PORT\", 8000)}/health').getcode() == 200 or exit(1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge